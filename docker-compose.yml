version: '3.8'

services:
  # Nginx 反向代理 + 静态资源
  nginx:
    image: nginx:alpine
    container_name: shop-nginx
    ports:
      - "80:80"
      - "8080:8080"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./data/uploads:/usr/share/nginx/uploads:ro
      - ./play:/usr/share/nginx/play:ro
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped
    networks:
      - shop-net

  # 后端 API 服务
  backend:
    image: node:20-alpine
    container_name: shop-backend
    working_dir: /app
    volumes:
      - ./backend:/app
      - ./data:/data
      - ./data/uploads:/app/uploads
      - ./data/screenshots:/app/screenshots
    ports:
      - "3000:3000"
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - DB_PATH=/data/shop.db
      - UPLOAD_DIR=/app/uploads
      - PORT=3000
    command: sh -c "npm install && node src/index.js"
    restart: unless-stopped
    networks:
      - shop-net

networks:
  shop-net:
    driver: bridge
